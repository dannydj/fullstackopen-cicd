name: Periodic health check

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'

jobs:
  health_check:
    runs-on: ubuntu-latest

    steps:
      - name: Check deployed Pokedex health
        uses: jtalk/url-health-check-action@v4
        with:
          url: ${{ secrets.POKEDEX_HEALTH_URL }}